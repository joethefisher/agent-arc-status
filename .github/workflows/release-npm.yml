name: Release npm

# Publishes the public @agent-arc-status/* packages when a v* tag is pushed.
#
# Auth is transitioning to OIDC trusted publishing (see docs/releasing.md). With
# a trusted publisher configured per package on npmjs.com and npm >= 11.5.1, the
# CLI authenticates via the workflow's OIDC token and falls back to NPM_TOKEN
# only if OIDC is unavailable. Once a release is confirmed to publish via OIDC,
# the NODE_AUTH_TOKEN step and the NPM_TOKEN secret can be removed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.9.
      - name: Use npm that supports trusted publishing
        run: npm install -g npm@latest

      - name: Install, build, verify
        run: |
          npm ci --ignore-scripts
          npm run build
          npm run typecheck
          npm test
          node packages/conformance/dist/run.js

      - name: Publish (reference first, then dependents)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in \
            @agent-arc-status/reference \
            @agent-arc-status/emitter \
            @agent-arc-status/cli \
            @agent-arc-status/dashboard \
            @agent-arc-status/adapter-otel \
            @agent-arc-status/adapter-mcp \
            @agent-arc-status/adapter-langchain; do
            echo "publishing $pkg"
            npm publish -w "$pkg" --provenance --access public
          done
