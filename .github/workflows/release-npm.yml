name: Release npm

# Publishes the public @agent-arc-status/* packages when a v* tag is pushed.
#
# Token-free via OIDC trusted publishing (see docs/releasing.md): each package
# has a trusted publisher configured on npmjs.com for this repo + this workflow,
# and npm >= 11.5.1 authenticates using the workflow's OIDC identity. No
# NPM_TOKEN — id-token: write is the only credential.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.9.
      - name: Use npm that supports trusted publishing
        run: npm install -g npm@latest

      - name: Install, build, verify
        run: |
          npm ci --ignore-scripts
          npm run build
          npm run typecheck
          npm test
          node packages/conformance/dist/run.js

      - name: Publish (reference first, then dependents)
        run: |
          set -euo pipefail
          for pkg in \
            @agent-arc-status/reference \
            @agent-arc-status/emitter \
            @agent-arc-status/cli \
            @agent-arc-status/dashboard \
            @agent-arc-status/adapter-otel \
            @agent-arc-status/adapter-mcp \
            @agent-arc-status/adapter-langchain; do
            echo "publishing $pkg"
            npm publish -w "$pkg" --provenance --access public
          done
