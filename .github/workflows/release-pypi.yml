name: Release PyPI

# Publishes the Python reference (agent-arc-status) to PyPI when a v* tag is
# pushed. Uses PyPI Trusted Publishing (OIDC) — configure a trusted publisher
# for this repository + workflow on PyPI (no stored token needed).

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # required for PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and verify
        working-directory: reference/python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: reference/python/dist/
