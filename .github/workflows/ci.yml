name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-workspaces:
    name: node workspaces (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  spec-and-schema:
    name: spec + schema sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate spec/schema.json parses as JSON
        run: |
          python3 -c "import json; json.load(open('spec/schema.json'))"

      - name: Validate example JSONL files parse as JSON Lines
        run: |
          set -euo pipefail
          for f in examples/*.jsonl; do
            echo "checking $f"
            python3 -c "
          import json, sys
          n = 0
          with open('$f') as fh:
              for i, line in enumerate(fh, 1):
                  line = line.strip()
                  if not line:
                      continue
                  json.loads(line)
                  n += 1
          print(f'  {n} events parsed')
          "
          done

      - name: Confirm every internal markdown link target exists
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, re, sys
          root = '.'
          errors = []
          link_re = re.compile(r'\[[^\]]+\]\(([^)#]+)(#[^)]*)?\)')
          for dirpath, _, files in os.walk(root):
              if '/.git' in dirpath or '/node_modules' in dirpath or '/dist' in dirpath:
                  continue
              for f in files:
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(dirpath, f)
                  with open(path) as fh:
                      text = fh.read()
                  for match in link_re.finditer(text):
                      target = match.group(1).strip()
                      if target.startswith(('http://', 'https://', 'mailto:')):
                          continue
                      resolved = os.path.normpath(os.path.join(dirpath, target))
                      if not os.path.exists(resolved):
                          errors.append(f"{path}: broken link → {target}")
          if errors:
              for e in errors:
                  print(e, file=sys.stderr)
              sys.exit(1)
          print("all internal links resolve")
          PY

      - name: No leaked internal strings
        run: |
          set -uo pipefail
          # Content scrubbed from this public repo; reappearance is a regression.
          PATTERN='webhook-bus|openclaw|74b35ac|priya|DATA-1842|tailscale|launchd|zillow|redfin|sessions\.send'
          # Exclude this workflow file itself, which necessarily contains the pattern.
          if git grep -inE "$PATTERN" -- . ':(exclude).github/workflows/ci.yml'; then
            echo "::error::leaked internal string(s) found (see matches above)"
            exit 1
          fi
          echo "no leaked strings"
